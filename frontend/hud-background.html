<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUD Background</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: transparent;
      --fg: rgb(165, 184, 248);
      --soft: rgba(165, 184, 248, 0.45);
      --scale: 1;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    }

    .stage {
      position: fixed;
      inset: 0;
      color: var(--fg);
      display: grid;
      place-items: center;
      perspective: 1400px;
      perspective-origin: 50% 50%;
      pointer-events: none;
    }

    .hud-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      transform: rotateY(0deg);
      transform-origin: 50% 50%;
      transform-style: preserve-3d;
      will-change: transform, filter;
      backface-visibility: hidden;
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
    }

    .data-rain {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      --rain-distance: 1200px;
      -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 25%, transparent 65%);
      mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 25%, transparent 65%);
    }

    .data-rain__icons {
      position: absolute;
      inset: 0;
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
    }

    .data-rain__mask {
      position: absolute;
      left: 0;
      width: 100%;
      height: 16%;
      pointer-events: none;
    }

    .data-rain__mask--top {
      top: 0;
      background: linear-gradient(to bottom, rgba(165, 184, 248, 0.02), transparent);
    }

    .data-rain__mask--bottom {
      bottom: 0;
      background: linear-gradient(to top, rgba(165, 184, 248, 0.02), transparent);
    }

    .data-file {
      position: absolute;
      top: 0;
      left: var(--file-left, 0%);
      width: 64px;
      height: 78px;
      color: rgba(165, 184, 248, 0.75);
      opacity: var(--file-opacity, 0.22);
      transform: translate3d(0, var(--file-y-start, -120px), 0) scale(var(--file-scale, 1));
      transform-origin: 50% 50%;
      filter: blur(var(--file-blur, 0px));
      transition: opacity 180ms linear, filter 180ms linear;
    }

    .data-file__sheet {
      position: absolute;
      inset: 0;
      background: rgba(165, 184, 248, 0.01);
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
    }

    .data-file__outline {
      position: absolute;
      inset: 0;
      fill: none;
      stroke: rgba(165, 184, 248, 0.12);
      stroke-width: 0.5;
      vector-effect: non-scaling-stroke;
    }

    .data-file__code {
      position: absolute;
      inset: 11px 9px 9px 9px;
      margin: 0;
      font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 9px;
      line-height: 1.08;
      letter-spacing: 0.12em;
      color: rgba(165, 184, 248, 0.35);
      white-space: pre;
      overflow: hidden;
      text-shadow: 0 0 8px rgba(165, 184, 248, 0.04);
    }

    .data-file--alert {
      color: rgba(255, 116, 64, 0.6);
    }

    .data-file--alert .data-file__outline {
      stroke: rgba(255, 116, 64, 0.2);
    }

    .data-file--alert .data-file__sheet {
      background: rgba(255, 116, 64, 0.02);
    }

    .data-file--alert .data-file__code {
      color: rgba(255, 164, 128, 0.45);
      text-shadow: 0 0 10px rgba(255, 116, 64, 0.1);
    }

    .data-file--destroying {
      transition: transform 220ms ease-out, opacity 220ms ease-out, filter 220ms ease-out;
    }

    #hudSvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      transform: translateZ(0);
    }

    .crt-overlay {
      display: none;
    }

    .scanlines,
    .scan-glow,
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scanlines {
      background:
        repeating-linear-gradient(
          180deg,
          rgba(165, 184, 248, 0.028) 0px,
          rgba(165, 184, 248, 0.028) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.22;
      animation: scan-drift 5s linear infinite;
    }

    .scan-glow {
      background:
        linear-gradient(
          180deg,
          transparent 0%,
          rgba(165, 184, 248, 0.04) 44%,
          rgba(165, 184, 248, 0.12) 50%,
          rgba(165, 184, 248, 0.04) 56%,
          transparent 100%
        );
      opacity: 0.22;
      animation: scan-sweep 4s linear infinite;
    }

    .vignette {
      background: radial-gradient(circle at center, transparent 60%, rgba(165, 184, 248, 0.015) 82%, rgba(165, 184, 248, 0.04) 100%);
    }

    .label {
      position: absolute;
      font-size: calc(11px * var(--scale));
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(165, 184, 248, 0.92);
      white-space: nowrap;
      text-shadow: 0 0 10px rgba(165, 184, 248, 0.25);
      pointer-events: none;
    }

    .dynamic-label {
      visibility: hidden;
    }

    .small {
      font-size: calc(9px * var(--scale));
      letter-spacing: 0.24em;
      color: rgba(165, 184, 248, 0.74);
    }

    .xsmall {
      font-size: calc(7px * var(--scale));
      letter-spacing: 0.22em;
      color: rgba(165, 184, 248, 0.74);
    }

    .label--alert {
      color: rgba(255, 136, 92, 0.9);
      text-shadow: 0 0 10px rgba(255, 116, 64, 0.3);
    }

    .label--blink {
      animation: label-blink 0.45s steps(2, end) infinite;
    }

    @keyframes label-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes scan-drift {
      from { transform: translateY(0); }
      to { transform: translateY(8px); }
    }

    @keyframes scan-sweep {
      from { transform: translateY(-100%); }
      to { transform: translateY(100%); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="hud-shell">
      <div class="data-rain">
        <div id="dataRainIcons" class="data-rain__icons"></div>
        <div class="data-rain__mask data-rain__mask--top"></div>
        <div class="data-rain__mask data-rain__mask--bottom"></div>
      </div>
      <svg id="hudSvg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-label="HUD">
        <defs>
          <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="0.08" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <linearGradient id="fadeLeft" x1="3" y1="50" x2="43" y2="50" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="rgb(165, 184, 248)" stop-opacity="0"></stop>
            <stop offset="36%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
            <stop offset="100%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
          </linearGradient>
          <linearGradient id="fadeRight" x1="57" y1="50" x2="97" y2="50" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
            <stop offset="64%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
            <stop offset="100%" stop-color="rgb(165, 184, 248)" stop-opacity="0"></stop>
          </linearGradient>
          <linearGradient id="fadeTop" x1="50" y1="7" x2="50" y2="43" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="rgb(165, 184, 248)" stop-opacity="0"></stop>
            <stop offset="36%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
            <stop offset="100%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
          </linearGradient>
          <linearGradient id="fadeBottom" x1="50" y1="57" x2="50" y2="93" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
            <stop offset="64%" stop-color="rgb(165, 184, 248)" stop-opacity="1"></stop>
            <stop offset="100%" stop-color="rgb(165, 184, 248)" stop-opacity="0"></stop>
          </linearGradient>
        </defs>

        <g id="reticle" filter="url(#softGlow)" opacity="0.4">
          <g id="crosshairArms" transform="translate(16.67 16.67) scale(0.6667)">
            <line x1="3" y1="50" x2="43" y2="50" stroke="url(#fadeLeft)" stroke-opacity="0.1" stroke-width="0.2"></line>
            <line x1="57" y1="50" x2="97" y2="50" stroke="url(#fadeRight)" stroke-opacity="0.1" stroke-width="0.2"></line>
            <line x1="50" y1="7" x2="50" y2="43" stroke="url(#fadeTop)" stroke-opacity="0.1" stroke-width="0.2"></line>
            <line x1="50" y1="57" x2="50" y2="93" stroke="url(#fadeBottom)" stroke-opacity="0.1" stroke-width="0.2"></line>

            <line x1="3" y1="50" x2="43" y2="50" stroke="url(#fadeLeft)" stroke-width="0.07"></line>
            <line x1="57" y1="50" x2="97" y2="50" stroke="url(#fadeRight)" stroke-width="0.07"></line>
            <line x1="50" y1="7" x2="50" y2="43" stroke="url(#fadeTop)" stroke-width="0.07"></line>
            <line x1="50" y1="57" x2="50" y2="93" stroke="url(#fadeBottom)" stroke-width="0.07"></line>

            <g id="crosshairTicks">
              <line x1="3" y1="49" x2="3" y2="51" stroke="rgb(165, 184, 248)" stroke-opacity="0.2" stroke-width="0.09"></line>
              <line x1="13" y1="48.85" x2="13" y2="51.15" stroke="url(#fadeLeft)" stroke-width="0.09"></line>
              <line x1="23" y1="48.85" x2="23" y2="51.15" stroke="url(#fadeLeft)" stroke-width="0.09"></line>
              <line x1="77" y1="48.85" x2="77" y2="51.15" stroke="url(#fadeRight)" stroke-width="0.09"></line>
              <line x1="87" y1="48.85" x2="87" y2="51.15" stroke="url(#fadeRight)" stroke-width="0.09"></line>
              <line x1="97" y1="49" x2="97" y2="51" stroke="rgb(165, 184, 248)" stroke-opacity="0.2" stroke-width="0.09"></line>
              <line x1="49" y1="7" x2="51" y2="7" stroke="rgb(165, 184, 248)" stroke-opacity="0.2" stroke-width="0.09"></line>
              <line x1="48.85" y1="17" x2="51.15" y2="17" stroke="url(#fadeTop)" stroke-width="0.09"></line>
              <line x1="48.85" y1="27" x2="51.15" y2="27" stroke="url(#fadeTop)" stroke-width="0.09"></line>
              <line x1="48.85" y1="73" x2="51.15" y2="73" stroke="url(#fadeBottom)" stroke-width="0.09"></line>
              <line x1="48.85" y1="83" x2="51.15" y2="83" stroke="url(#fadeBottom)" stroke-width="0.09"></line>
              <line x1="49" y1="93" x2="51" y2="93" stroke="rgb(165, 184, 248)" stroke-opacity="0.2" stroke-width="0.09"></line>
            </g>
          </g>
        </g>
        <g id="lockCore" filter="url(#softGlow)">
          <g id="trackingGroup" transform="translate(29.56 29.56) scale(0.4444)">
            <rect id="trackingAreaBg" x="33.85" y="33.85" width="24.3" height="24.3" fill="rgb(165, 184, 248)" fill-opacity="0.04"></rect>
            <rect id="trackingBox" x="30.5" y="30.5" width="31" height="31" fill="none" stroke="rgb(165, 184, 248)" stroke-opacity="0.48" stroke-width="0.12"></rect>
          </g>
        </g>
        <circle id="centerDot" cx="50" cy="50" r="1.6" fill="none" stroke="rgb(165, 184, 248)" stroke-opacity="0.2" stroke-width="0.14"></circle>
      </svg>

      <div class="overlay hud-overlay">
        <div id="lockLabel" class="label xsmall dynamic-label label--blink">SEARCHING</div>
        <div id="lockedLabel" class="label dynamic-label">LOCKED</div>
        <div id="lockedSub" class="label small dynamic-label">TRK DEV 000%</div>
        <div id="targetLeftLabel" class="label xsmall dynamic-label">TARGET 0000000000</div>
      </div>
    </div>

    <div class="overlay crt-overlay">
      <div class="scanlines"></div>
      <div class="scan-glow"></div>
      <div class="vignette"></div>
    </div>
  </div>

  <script>
    const dataRainIcons = document.getElementById("dataRainIcons");
    const reticle = document.getElementById("reticle");
    const centerDot = document.getElementById("centerDot");
    const lockLabel = document.getElementById("lockLabel");
    const lockedLabel = document.getElementById("lockedLabel");
    const lockedSub = document.getElementById("lockedSub");
    const targetLeftLabel = document.getElementById("targetLeftLabel");
    const hudShell = document.querySelector(".hud-shell");
    const trackingGroup = document.getElementById("trackingGroup");
    const trackingAreaBg = document.getElementById("trackingAreaBg");
    const trackingBox = document.getElementById("trackingBox");

    let targetRotateY = 0;
    let currentRotateY = 0;
    const maxHudRotateY = 15;
    const reticleDepthOffset = 1.9;
    const trackingDepthOffset = 0.55;
    const dataFileStates = [];
    const baseTrackingScale = 0.4444;
    const trackingCenterLocal = 46;
    const lockState = {
      target: null,
      phase: "idle",
      nextAcquireAt: performance.now() + 1800,
      phaseStartedAt: 0,
      x: 50,
      y: 50,
      scale: baseTrackingScale
    };
    const reticleState = { x: 50, y: 50, speed: 46, targetX: 50, targetY: 50 };
    const centerRingState = { x: 50, y: 50, speed: 46, targetX: 50, targetY: 50 };
    const centerRingLagState = { x: 50, y: 50 };
    const preAimHoldState = { x: 0, y: 0 };
    const innerLagState = { x: 50, y: 50 };
    let idleEyeStartAt = performance.now() + 420;
    let targetCode = randomCodeLine(10);
    let lastFrameTime = performance.now();
    const trackingAreaBase = { x: 33.85, y: 33.85, size: 24.3 };
    const trackingBoxBase = { x: 30.5, y: 30.5, size: 31, center: 46 };

    function randomCodeLine(length) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let out = "";
      for (let i = 0; i < length; i += 1) out += alphabet[Math.floor(Math.random() * alphabet.length)];
      return out;
    }

    function createDataFile(index, total) {
      const file = document.createElement("div");
      file.className = "data-file";

      const sheet = document.createElement("div");
      sheet.className = "data-file__sheet";

      const outline = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      outline.classList.add("data-file__outline");
      outline.setAttribute("viewBox", "0 0 64 78");
      outline.setAttribute("preserveAspectRatio", "none");

      const outlinePath = document.createElementNS("http://www.w3.org/2000/svg", "path");
      outlinePath.setAttribute("d", "M1 1 H49 L63 15 V77 H1 Z");
      outline.appendChild(outlinePath);

      const code = document.createElement("pre");
      code.className = "data-file__code";
      const rows = [randomCodeLine(4), randomCodeLine(4), randomCodeLine(4), randomCodeLine(4)];
      code.textContent = rows.join("\n");

      file.appendChild(sheet);
      file.appendChild(outline);
      file.appendChild(code);

      const scale = 0.48 + Math.random() * 1.18;
      const blur = Math.max(0, (1.35 - scale) * 1.8);
      const opacity = 0.12 + Math.random() * 0.28;
      const duration = 8 + Math.random() * 10;
      const laneWidth = 64 / total;
      const laneStart = 18 + laneWidth * index;
      const jitter = (Math.random() - 0.5) * Math.min(2.8, laneWidth * 0.35);
      const left = laneStart + laneWidth * 0.5 - 4 + jitter;
      const widthPx = index % 4 === 0 ? 82 : index % 3 === 0 ? 54 : 64;
      const heightPx = index % 4 === 0 ? 100 : index % 3 === 0 ? 66 : 78;
      const yStart = -140 - Math.random() * 220;
      const progress = Math.random();

      file.style.setProperty("--file-scale", scale.toFixed(3));
      file.style.setProperty("--file-opacity", opacity.toFixed(3));
      file.style.setProperty("--file-blur", `${blur.toFixed(2)}px`);
      file.style.setProperty("--file-left", `${left.toFixed(2)}%`);
      if (index % 3 === 0) {
        file.style.width = "54px";
        file.style.height = "66px";
      } else if (index % 4 === 0) {
        file.style.width = "82px";
        file.style.height = "100px";
      }

      dataFileStates.push({
        element: file,
        code,
        rows,
        width: 4,
        leftPercent: left,
        yStart,
        progress,
        duration,
        scale,
        opacity,
        blur,
        widthPx,
        heightPx,
        currentY: yStart + progress * 1200,
        frozen: false,
        status: "falling",
        statusAt: 0
      });

      return file;
    }

    function buildDataRain() {
      dataRainIcons.innerHTML = "";
      dataFileStates.length = 0;
      const total = 18;
      for (let i = 0; i < total; i += 1) dataRainIcons.appendChild(createDataFile(i, total));
    }

    function rollDataFileText() {
      for (const fileState of dataFileStates) {
        if (fileState.status === "destroying") continue;
        if (Math.random() < 0.3) {
          fileState.rows.shift();
          fileState.rows.push(randomCodeLine(fileState.width));
        } else {
          const rowIndex = Math.floor(Math.random() * fileState.rows.length);
          fileState.rows[rowIndex] = randomCodeLine(fileState.width);
        }
        fileState.code.textContent = fileState.rows.join("\n");
      }
    }

    function rollTargetCode() {
      if (lockState.target) return;
      targetCode = randomCodeLine(10);
      targetLeftLabel.textContent = `TARGET ${targetCode}`;
    }

    function layoutDataRain() {
      const shellSize = hudShell.getBoundingClientRect().height;
      const rainDistance = shellSize + 420;
      dataRainIcons.style.setProperty("--rain-distance", `${rainDistance.toFixed(0)}px`);
    }

    function getHudMetrics() {
      const width = hudShell.clientWidth;
      const height = hudShell.clientHeight;
      const size = Math.min(width, height);
      return { width, height, size, offsetX: (width - size) * 0.5, offsetY: (height - size) * 0.5 };
    }

    function resetDataFile(fileState) {
      fileState.element.classList.remove("data-file--alert", "data-file--destroying");
      fileState.status = "falling";
      fileState.frozen = false;
      fileState.scale = 0.48 + Math.random() * 1.18;
      fileState.blur = Math.max(0, (1.35 - fileState.scale) * 1.8);
      fileState.opacity = 0.12 + Math.random() * 0.28;
      fileState.duration = 8 + Math.random() * 10;
      fileState.yStart = -140 - Math.random() * 220;
      fileState.progress = 0;
      fileState.currentY = fileState.yStart;
      fileState.element.style.opacity = fileState.opacity.toFixed(3);
      fileState.element.style.filter = `blur(${fileState.blur.toFixed(2)}px)`;
      fileState.element.style.transform = `translate3d(0, ${fileState.yStart.toFixed(2)}px, 0) scale(${fileState.scale.toFixed(3)})`;
      fileState.rows = [randomCodeLine(fileState.width), randomCodeLine(fileState.width), randomCodeLine(fileState.width), randomCodeLine(fileState.width)];
      fileState.code.textContent = fileState.rows.join("\n");
    }

    function getFileCenterSvg(fileState) {
      const hud = getHudMetrics();
      const leftPx = (fileState.leftPercent / 100) * hud.width;
      const centerX = leftPx + fileState.widthPx * 0.5;
      const centerY = fileState.currentY + fileState.heightPx * 0.5;
      return { x: ((centerX - hud.offsetX) / hud.size) * 100, y: ((centerY - hud.offsetY) / hud.size) * 100 };
    }

    function positionTrackingGroup(x, y, scale) {
      const tx = x + trackingDepthOffset * (currentRotateY / maxHudRotateY) - trackingCenterLocal * scale;
      const ty = y - trackingCenterLocal * scale;
      trackingGroup.setAttribute("transform", `matrix(${scale.toFixed(4)} 0 0 ${scale.toFixed(4)} ${tx.toFixed(3)} ${ty.toFixed(3)})`);
    }

    function positionReticle(x, y) {
      const depthX = reticleDepthOffset * (currentRotateY / maxHudRotateY);
      reticle.setAttribute("transform", `translate(${(x - 50 + depthX).toFixed(3)} ${(y - 50).toFixed(3)})`);
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeOutBack(t) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function getIdleEyeOffset(now) {
      const cycle = 1467;
      const phase = (now % cycle) / cycle;
      const ease = (t) => 0.5 - 0.5 * Math.cos(Math.PI * t);
      if (phase < 0.12) return { x: 0, y: 0 };
      if (phase < 0.24) return { x: -0.9 * ease((phase - 0.12) / 0.12), y: 0 };
      if (phase < 0.34) return { x: -0.9, y: 0 };
      if (phase < 0.44) return { x: -0.9 * (1 - ease((phase - 0.34) / 0.10)), y: 0 };
      if (phase < 0.56) return { x: 0.9 * ease((phase - 0.44) / 0.12), y: 0 };
      if (phase < 0.66) return { x: 0.9, y: 0 };
      if (phase < 0.76) return { x: 0.9 * (1 - ease((phase - 0.66) / 0.10)), y: 0 };
      if (phase < 0.88) return { x: 0, y: -0.8 * ease((phase - 0.76) / 0.12) };
      return { x: 0, y: -0.8 * (1 - ease((phase - 0.88) / 0.12)) };
    }

    function updateCenterRing(now, dt) {
      const delayAlpha = 1 - Math.exp(-dt / 0.05);
      centerRingLagState.x += (reticleState.targetX - centerRingLagState.x) * delayAlpha;
      centerRingLagState.y += (reticleState.targetY - centerRingLagState.y) * delayAlpha;
      centerRingState.targetX = centerRingLagState.x;
      centerRingState.targetY = centerRingLagState.y;

      const ringAlpha = 1 - Math.exp(-centerRingState.speed * dt);
      centerRingState.x += (centerRingState.targetX - centerRingState.x) * ringAlpha;
      centerRingState.y += (centerRingState.targetY - centerRingState.y) * ringAlpha;

      let pulseScale = 1;
      let stroke = "rgb(165, 184, 248)";
      let strokeOpacity = "0.2";
      let opacity = "0.4";
      const depthX = reticleDepthOffset * (currentRotateY / maxHudRotateY);
      const idleEyeOffset = !lockState.target && lockState.phase === "idle" && now >= idleEyeStartAt ? getIdleEyeOffset(now - idleEyeStartAt) : { x: 0, y: 0 };
      let preAimOffset = { x: 0, y: 0 };

      if (lockState.target && lockState.phase === "seeking") {
        preAimOffset = preAimHoldState;
      } else if (lockState.target && lockState.phase === "await_crosshair") {
        const crosshairDist = Math.hypot(reticleState.targetX - reticleState.x, reticleState.targetY - reticleState.y);
        const lookStrength = Math.max(0, Math.min(1, crosshairDist / 6));
        preAimOffset = { x: preAimHoldState.x * lookStrength, y: preAimHoldState.y * lookStrength };
      }

      if (lockState.phase === "destroying") {
        const elapsed = now - lockState.phaseStartedAt;
        const progress = Math.max(0, Math.min(1, elapsed / 420));
        if (progress < 0.3) pulseScale = 1 - 0.2 * easeOutCubic(progress / 0.3);
        else pulseScale = 0.8 + 0.2 * easeOutBack((progress - 0.3) / 0.7);
        stroke = "rgba(255, 136, 92, 0.92)";
        strokeOpacity = "0.92";
        opacity = "0.92";
      }

      centerDot.setAttribute("transform", `translate(${(centerRingState.x - 50 + depthX + idleEyeOffset.x + preAimOffset.x).toFixed(3)} ${(centerRingState.y - 50 + idleEyeOffset.y + preAimOffset.y).toFixed(3)}) translate(50 50) scale(${pulseScale.toFixed(4)}) translate(-50 -50)`);
      centerDot.setAttribute("stroke", stroke);
      centerDot.setAttribute("stroke-opacity", strokeOpacity);
      centerDot.setAttribute("opacity", opacity);
    }

    function positionTrackingInnerArea(groupX, groupY, scale, dt) {
      const lagAlpha = 1 - Math.exp(-dt / 0.08);
      innerLagState.x += (groupX - innerLagState.x) * lagAlpha;
      innerLagState.y += (groupY - innerLagState.y) * lagAlpha;
      const localOffsetX = (innerLagState.x - groupX) / Math.max(scale, 0.0001);
      const localOffsetY = (innerLagState.y - groupY) / Math.max(scale, 0.0001);
      trackingAreaBg.setAttribute("x", (trackingAreaBase.x + localOffsetX).toFixed(3));
      trackingAreaBg.setAttribute("y", (trackingAreaBase.y + localOffsetY).toFixed(3));
    }

    function updateTrackingBoxPulse(now) {
      let pulseScale = 1;
      if (lockState.phase === "destroying") {
        const elapsed = now - lockState.phaseStartedAt;
        const progress = Math.max(0, Math.min(1, elapsed / 420));
        if (progress < 0.3) pulseScale = 1 - 0.2 * easeOutCubic(progress / 0.3);
        else pulseScale = 0.8 + 0.2 * easeOutBack((progress - 0.3) / 0.7);
      }

      const size = trackingBoxBase.size * pulseScale;
      const offset = size * 0.5;
      trackingBox.setAttribute("x", (trackingBoxBase.center - offset).toFixed(3));
      trackingBox.setAttribute("y", (trackingBoxBase.center - offset).toFixed(3));
      trackingBox.setAttribute("width", size.toFixed(3));
      trackingBox.setAttribute("height", size.toFixed(3));
    }

    function setLabel(el, x, y) {
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.visibility = "visible";
    }

    function layoutTrackingLabels(x, y, scale) {
      const hud = getHudMetrics();
      const unit = hud.size / 100;
      const depthX = trackingDepthOffset * (currentRotateY / maxHudRotateY);
      const trackingAreaX = x + depthX + (33.85 - trackingCenterLocal) * scale;
      const trackingAreaY = y + (33.85 - trackingCenterLocal) * scale;
      const trackingAreaSize = 24.3 * scale;
      const isSearching = lockState.phase === "idle" || lockState.phase === "seeking";
      lockLabel.textContent = isSearching ? "SEARCHING" : "LOCKED";
      setLabel(lockLabel, hud.offsetX + trackingAreaX * unit + 6, hud.offsetY + trackingAreaY * unit + 6);
      setLabel(targetLeftLabel, hud.offsetX + trackingAreaX * unit + 6, hud.offsetY + (trackingAreaY + trackingAreaSize) * unit - 16);
    }

    function pickRandomTarget(now) {
      const candidates = dataFileStates.filter((fileState) => {
        if (fileState.status !== "falling") return false;
        const center = getFileCenterSvg(fileState);
        return center.y > 8 && center.y < 92;
      });
      if (!candidates.length) {
        lockState.nextAcquireAt = now + 800;
        return;
      }
      const selected = candidates[Math.floor(Math.random() * candidates.length)];
      const targetCenter = getFileCenterSvg(selected);
      const dx = targetCenter.x - lockState.x;
      const dy = targetCenter.y - lockState.y;
      const aimDx = dx * 0.9;
      const aimDy = dy * 1.35;
      const distance = Math.hypot(aimDx, aimDy);
      const lookDistance = Math.min(1.05, distance * 0.28);
      if (distance > 0.001) {
        preAimHoldState.x = (aimDx / distance) * lookDistance;
        preAimHoldState.y = (aimDy / distance) * lookDistance;
      } else {
        preAimHoldState.x = 0;
        preAimHoldState.y = 0;
      }
      selected.frozen = true;
      selected.status = "seeking";
      selected.statusAt = now;
      lockState.target = selected;
      lockState.phase = "seeking";
      lockState.phaseStartedAt = now;
    }

    function updateDataRainAndLock(now, dt) {
      const rainDistance = getHudMetrics().height + 420;
      for (const fileState of dataFileStates) {
        if (!fileState.frozen && fileState.status === "falling") {
          fileState.progress += dt / fileState.duration;
          if (fileState.progress > 1.05) resetDataFile(fileState);
        }

        if (fileState.status === "destroying") {
          const destroyElapsed = now - fileState.statusAt;
          if (destroyElapsed > 220) {
            resetDataFile(fileState);
            if (lockState.target === fileState) {
              const reboundEndsAt = lockState.phaseStartedAt + 420;
              lockState.target = null;
              lockState.phase = "idle";
              lockState.nextAcquireAt = now + (1500 + Math.random() * 1500);
              idleEyeStartAt = reboundEndsAt;
              preAimHoldState.x = 0;
              preAimHoldState.y = 0;
              targetLeftLabel.classList.remove("label--alert");
            }
          }
        }

        const yPx = fileState.yStart + fileState.progress * rainDistance;
        fileState.currentY = yPx;
        if (fileState.status === "destroying") {
          fileState.element.style.opacity = "0";
          fileState.element.style.filter = "blur(6px)";
          fileState.element.style.transform = `translate3d(0, ${yPx.toFixed(2)}px, 0) scale(${(fileState.scale * 1.18).toFixed(3)})`;
        } else {
          fileState.element.style.opacity = fileState.opacity.toFixed(3);
          fileState.element.style.filter = `blur(${fileState.blur.toFixed(2)}px)`;
          fileState.element.style.transform = `translate3d(0, ${yPx.toFixed(2)}px, 0) scale(${fileState.scale.toFixed(3)})`;
        }
      }

      if (!lockState.target && now >= lockState.nextAcquireAt) pickRandomTarget(now);

      if (lockState.target) {
        const targetCenter = getFileCenterSvg(lockState.target);
        lockState.x += (targetCenter.x - lockState.x) * 0.09;
        lockState.y += (targetCenter.y - lockState.y) * 0.09;
        lockState.scale = baseTrackingScale;

        if (lockState.phase === "seeking") {
          const dist = Math.hypot(targetCenter.x - lockState.x, targetCenter.y - lockState.y);
          if (dist < 0.18) {
            lockState.x = targetCenter.x;
            lockState.y = targetCenter.y;
            lockState.phase = "await_crosshair";
            lockState.phaseStartedAt = now;
            reticleState.targetX = lockState.x;
            reticleState.targetY = lockState.y;
          }
        } else if (lockState.phase === "await_crosshair") {
          lockState.x = targetCenter.x;
          lockState.y = targetCenter.y;
          reticleState.targetX = lockState.x;
          reticleState.targetY = lockState.y;
          const crosshairDist = Math.hypot(reticleState.targetX - reticleState.x, reticleState.targetY - reticleState.y);
          if (crosshairDist < 0.18) {
            lockState.phase = "alert";
            lockState.phaseStartedAt = now;
            lockState.target.status = "alert";
            lockState.target.element.classList.add("data-file--alert");
            lockState.target.opacity = 0.92;
            lockState.target.blur = 0;
            targetLeftLabel.classList.add("label--alert");
          }
        } else if (lockState.phase === "alert" && now - lockState.phaseStartedAt >= 200) {
          lockState.phase = "destroying";
          lockState.phaseStartedAt = now;
          lockState.target.status = "destroying";
          lockState.target.statusAt = now;
          lockState.target.element.classList.add("data-file--destroying");
          lockState.target.element.style.opacity = "0";
          lockState.target.element.style.filter = "blur(6px)";
        }
      }

      lockState.scale = baseTrackingScale;
      positionTrackingGroup(lockState.x, lockState.y, lockState.scale);
      positionTrackingInnerArea(lockState.x, lockState.y, lockState.scale, dt);
      updateTrackingBoxPulse(now);
      layoutTrackingLabels(lockState.x, lockState.y, lockState.scale);

      if (lockState.phase === "await_crosshair" || lockState.phase === "alert" || lockState.phase === "destroying") {
        reticleState.targetX = lockState.x;
        reticleState.targetY = lockState.y;
      }
      const reticleAlpha = 1 - Math.exp(-reticleState.speed * dt);
      reticleState.x += (reticleState.targetX - reticleState.x) * reticleAlpha;
      reticleState.y += (reticleState.targetY - reticleState.y) * reticleAlpha;
      positionReticle(reticleState.x, reticleState.y);
      updateCenterRing(now, dt);
    }

    function hudScale() {
      const scale = Math.max(0.82, Math.min(1.22, Math.min(window.innerWidth, window.innerHeight) / 900));
      document.documentElement.style.setProperty("--scale", scale.toFixed(3));
      return scale;
    }

    function layoutStaticOverlay() {
      lockedLabel.style.visibility = "hidden";
      lockedSub.style.visibility = "hidden";
      layoutTrackingLabels(lockState.x, lockState.y, lockState.scale);
      positionReticle(reticleState.x, reticleState.y);
      updateCenterRing(performance.now(), 0);
    }

    function setup() {
      hudScale();
      buildDataRain();
      layoutDataRain();
      targetLeftLabel.textContent = `TARGET ${targetCode}`;
      positionTrackingGroup(lockState.x, lockState.y, lockState.scale);
      positionTrackingInnerArea(lockState.x, lockState.y, lockState.scale, 0);
      updateTrackingBoxPulse(performance.now());
      positionReticle(reticleState.x, reticleState.y);
      updateCenterRing(performance.now(), 0);
    }

    function animateHudTilt() {
      const now = performance.now();
      const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
      lastFrameTime = now;
      targetRotateY = Math.max(-maxHudRotateY, Math.min(maxHudRotateY, ((lockState.x - 50) / 50) * maxHudRotateY));
      currentRotateY += (targetRotateY - currentRotateY) * 0.08;
      hudShell.style.transform = `rotateY(${currentRotateY.toFixed(3)}deg)`;
      updateDataRainAndLock(now, dt);
      requestAnimationFrame(animateHudTilt);
    }

    window.addEventListener("resize", () => {
      hudScale();
      layoutDataRain();
      layoutStaticOverlay();
    });

    setup();
    layoutStaticOverlay();
    requestAnimationFrame(animateHudTilt);
    window.setInterval(rollDataFileText, 140);
    window.setInterval(rollTargetCode, 70);
  </script>
</body>
</html>
